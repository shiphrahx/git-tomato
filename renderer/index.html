<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>git-tomato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
    <script>
      try {
        var h = new Date().getHours();
        var auto = (h >= 6 && h < 18) ? 'morning' : 'twilight';
        var manual = localStorage.getItem('gt-theme-manual');
        document.documentElement.setAttribute('data-theme', manual || auto);
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'twilight');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
